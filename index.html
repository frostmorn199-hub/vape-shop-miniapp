<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>VAPE SHOP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <span class="header-title">💨 VAPE SHOP VRN</span>
    <a href="game.html" class="game-btn">🎮 Играть</a>
  </div>

  <!-- LOYALTY BAR -->
  <div id="loyalty-bar" class="loyalty-bar">
    <div class="loyalty-info">
      <span id="loyalty-label">Накопи 20 000₽ для Бронзы 🥉</span>
      <span id="loyalty-total">0₽</span>
    </div>
    <div class="progress-track">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
  </div>

  <!-- ========== ЭКРАН: КАТАЛОГ ========== -->
  <div id="screen-catalog" class="screen active">
    <div class="tabs" id="tabs"></div>
    <div id="products-grid" class="products-grid">
      <div class="placeholder">Загружаем товары…</div>
    </div>
  </div>

  <!-- ========== ЭКРАН: КОРЗИНА ========== -->
  <div id="screen-cart" class="screen">
    <div class="screen-header">
      <button class="back-btn" onclick="showScreen('catalog')">← Назад</button>
      <span class="screen-title">Корзина</span>
    </div>
    <div id="cart-items"></div>
    <div id="cart-total-block"></div>
    <div class="screen-footer">
      <button class="btn-primary" onclick="showScreen('checkout')">Оформить заказ</button>
    </div>
  </div>

  <!-- ========== ЭКРАН: ОФОРМЛЕНИЕ ========== -->
  <div id="screen-checkout" class="screen">
    <div class="screen-header">
      <button class="back-btn" onclick="showScreen('cart')">← Назад</button>
      <span class="screen-title">Оформление</span>
    </div>
    <div class="form-body">

      <div class="field-group">
        <label class="field-label">Контакт (@username или телефон)</label>
        <input type="text" id="inp-contact" class="field-input" placeholder="@username или +7 999 …">
      </div>

      <div class="field-group">
        <label class="field-label">Способ получения</label>
        <label class="radio-card">
          <input type="radio" name="delivery" value="pickup" checked onchange="toggleAddress()">
          <div class="radio-content">
            <span class="radio-icon">🚶</span>
            <div>
              <div class="radio-title">Самовывоз</div>
              <div class="radio-sub">Кривошеина 13/2</div>
            </div>
          </div>
        </label>
        <label class="radio-card">
          <input type="radio" name="delivery" value="courier" onchange="toggleAddress()">
          <div class="radio-content">
            <span class="radio-icon">🚚</span>
            <div>
              <div class="radio-title">Доставка курьером</div>
              <div class="radio-sub">Укажи адрес ниже</div>
            </div>
          </div>
        </label>
      </div>

      <div id="address-block" class="field-group hidden">
        <label class="field-label">Адрес доставки</label>
        <input type="text" id="inp-address" class="field-input" placeholder="Улица, дом, кв.">
      </div>

      <div class="field-group">
        <label class="field-label">Способ оплаты</label>
        <label class="radio-card">
          <input type="radio" name="pay" value="card" checked>
          <div class="radio-content">
            <span class="radio-icon">💳</span>
            <div class="radio-title">Перевод на карту</div>
          </div>
        </label>
        <label class="radio-card">
          <input type="radio" name="pay" value="cash">
          <div class="radio-content">
            <span class="radio-icon">💵</span>
            <div class="radio-title">Наличные</div>
          </div>
        </label>
      </div>

      <div id="order-summary" class="order-summary"></div>

      <button class="btn-primary btn-confirm" onclick="submitOrder()">✅ Подтвердить заказ</button>
    </div>
  </div>

  <!-- FAB корзина -->
  <button id="cart-fab" class="cart-fab hidden" onclick="showScreen('cart')">
    🛒 <span id="fab-count">0</span>
  </button>

  <script src="app.js"></script>
</body>
</html>
